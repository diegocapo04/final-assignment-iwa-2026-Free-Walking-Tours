{% extends "base.html" %}

{% block title %}Login - Arpino Walks{% endblock %}

{% block content %}
<section class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <h1 class="h2 mb-4">Login</h1>

        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input
                    type="email"
                    class="form-control"
                    id="email"
                    name="email"
                    required
                    maxlength="255"
                >
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input
                    type="password"
                    class="form-control"
                    id="password"
                    name="password"
                    required
                    minlength="8"
                    maxlength="128"
                >
            </div>

            <button type="submit" class="btn btn-primary">Login</button>
        </form>
    </div>
</section>
{% endblock %}
